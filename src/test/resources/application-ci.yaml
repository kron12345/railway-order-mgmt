spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ordermgmt_test
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: test-client
            client-secret: test-secret
        provider:
          keycloak:
            issuer-uri: http://localhost:8180/realms/test
  devtools:
    livereload:
      enabled: false
      port: 35729
