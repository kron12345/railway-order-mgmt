spring:
  application:
    name: railway-order-mgmt

  datasource:
    # NOTE: For production, add ?sslmode=verify-full to the JDBC URL
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ordermgmt}
    username: ${DB_USER:ordermgmt}
    password: ${DB_PASSWORD:ordermgmt}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        org.hibernate.envers:
          audit_table_suffix: _audit
          revision_field_name: revision_id
          revision_type_field_name: revision_type

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:order-mgmt}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:}
            scope: openid, profile, email, roles
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/railway}

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10,expireAfterWrite=5m

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8085}
  forward-headers-strategy: native
  error:
    include-stacktrace: never
    include-message: never

keycloak:
  admin:
    url: ${KEYCLOAK_ADMIN_URL:https://sso.animeland.de}
    realm: ${KEYCLOAK_REALM:railway}
    client-id: admin-cli
    username: ${KEYCLOAK_ADMIN_USER:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:}

vaadin:
  launch-browser: true
  allowed-packages:
    - com.ordermgmt.railway
